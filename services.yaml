send_message:
  name: Send Message
  description: Send a Signal message to one or more recipients.
  fields:
    message:
      name: Message
      description: The message text.
      required: true
      example: "Hello from Home Assistant"
      selector:
        text:
          multiline: true
    contact_entity_id:
      name: Target Entities
      description: Select Signal contact or group sensors to send the message to.
      required: false
      selector:
        entity:
          multiple: true
          filter:
            - integration: signal_websocket
              domain: sensor
    view_once:
      name: View Once
      description: Send message as view-once.
      required: false
      example: true
      selector:
        boolean:
    recipients:
      name: Manual Recipients
      description: List of phone numbers or usernames for direct messages.
      required: false
      example: ["+1234567890"]
      selector:
        object:
    group_id:
      name: Group ID
      description: Group ID to send a message to a group. If set, direct recipients may be omitted.
      required: false
      example: "groupidhex"
    base64_attachments:
      name: Attachments
      description: List of base64-encoded attachments (optional).
      required: false
      example: ["base64string"]
    attachments:
      name: Local Attachments
      description: List of local file paths to attach (must be in allowed directories).
      required: false
      example: ["/media/local/snapshots/test.jpg"]
      selector:
        object:
    urls:
      name: URL Attachments
      description: List of full URLs to fetch and attach.
      required: false
      example: ["https://testurl.local/testimage.png"]
      selector:
        object:
    sticker:
      name: Sticker
      description: Sticker ID to send (optional).
      required: false
      example: "sticker-id"
    text_mode:
      name: Text Mode
      description: Use styling options like 'styled' for rich text.
      required: false
      example: "styled"
    notify_self:
      name: Notify Self
      description: Whether the sender should receive a copy.
      required: false
      example: false
    quote_author:
      name: Quote Author
      description: Author of the message being replied to.
      required: false
      example: "+1234567890"
    quote_message:
      name: Quote Message
      description: Text of the quoted message.
      required: false
      example: "Original message"
    quote_timestamp:
      name: Quote Timestamp
      description: Timestamp of the quoted message.
      required: false
      example: 1234567890
    edit_timestamp:
      name: Edit Timestamp
      description: Original message timestamp for edits.
      required: false
      example: 1234567890

create_group:
  name: Create Group
  description: Create a new Signal group.
  fields:
    name:
      name: Name
      description: Group name.
      required: true
      example: "My Group"
      selector:
        text:
    members:
      name: Members
      description: List of member phone numbers or contact sensors.
      required: true
      example: ["+1234567890"]
      selector:
        object:
    description:
      name: Description
      description: Optional group description.
      required: false
      selector:
        text:
          multiline: true
    expiration_time:
      name: Disappearing Messages Timer
      description: Expiration time in seconds (0 to disable).
      required: false
      selector:
        number:
          min: 0
          max: 604800
          unit_of_measurement: seconds
    group_link:
      name: Group Link
      description: Enable or disable group link.
      required: false
      selector:
        select:
          options:
            - label: Disabled
              value: disabled
            - label: Enabled
              value: enabled
            - label: Enabled with Approval
              value: enabled-with-approval
    add_members:
      name: Permission - Add Members
      required: false
      selector: &perm_selector
        select:
          options:
            - label: Only Admins
              value: only-admins
            - label: Every Member
              value: every-member
    edit_group:
      name: Permission - Edit Group
      required: false
      selector: *perm_selector
    send_messages:
      name: Permission - Send Messages
      required: false
      selector: *perm_selector

manage_group_membership:
  name: "Group: Manage Membership"
  description: Add/remove members or promote/demote admins in a Signal group.
  fields:
    operation:
      name: Operation
      description: "Whether to add/promote or remove/demote the specified users."
      required: true
      selector:
        select:
          options:
            - label: Add / Promote
              value: add
            - label: Remove / Demote
              value: remove
    role:
      name: Role
      description: "Whether you are managing basic membership or administrator status."
      required: true
      default: member
      selector:
        select:
          options:
            - label: Member
              value: member
            - label: Admin
              value: admin
    group_id:
      name: Group ID
      description: Signal Group ID (Base64) or a Signal Group sensor entity.
      required: true
      example: "EdY6Vmqzv0Q/zsGoJCpVlRqu/oGz+ziqkU0F0jow6gJI="
      selector:
        entity:
          filter:
            - integration: signal_websocket
              domain: sensor
    members:
      name: Members
      description: List of phone numbers or contact sensors.
      required: true
      example: ["+1234567890"]
      selector:
        object:

update_group:
  name: Update Group
  description: Update group name or description.
  fields:
    group_id:
      name: Group ID
      description: Signal Group ID (Base64) or a Signal Group sensor entity.
      required: true
      example: "EdY6Vmqzv0Q/zsGoJCpVlRqu/oGz+ziqkU0F0jow6gJI="
      selector:
        entity:
          filter:
            - integration: signal_websocket
              domain: sensor
    name:
      name: Name
      required: false
    description:
      name: Description
      required: false
    expiration_time:
      name: Disappearing Messages Timer
      required: false
    group_link:
      name: Group Link
      required: false
    add_members:
      name: Permission - Add Members
      required: false
    edit_group:
      name: Permission - Edit Group
      required: false
    send_messages:
      name: Permission - Send Messages
      required: false

delete_group:
  name: Delete Group
  description: Delete a group.
  fields:
    group_id:
      name: Group ID
      description: Signal Group ID (Base64) or a Signal Group sensor entity.
      required: true
      example: "EdY6Vmqzv0Q/zsGoJCpVlRqu/oGz+ziqkU0F0jow6gJI="
      selector:
        entity:
          filter:
            - integration: signal_websocket
              domain: sensor

sync_contacts:
  name: Sync Contacts
  description: Sync local contacts to linked devices.

update_contact:
  name: Update Contact
  description: Update contact info.
  fields:
    contact_number:
      name: Contact Number
      required: true
    name:
      name: Name
      required: false

remove_contact:
  name: Remove Contact
  description: Remove a contact from the local contact list.
  fields:
    contact_number:
      name: Contact Number
      description: The phone number of the contact to remove.
      required: true
      example: "+1234567890"